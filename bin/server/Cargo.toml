[package]
name = "dms-server"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
publish.workspace = true

[[bin]]
name = "dms-server"
path = "src/main.rs"

[dependencies]
dms-core.workspace = true
dms-config.workspace = true
dms-application.workspace = true
dms-api.workspace = true
tokio.workspace = true
axum.workspace = true
anyhow.workspace = true
tracing.workspace = true
dms-infrastructure = { workspace = true, optional = true }
sqlx = { workspace = true, optional = true }

# 复杂度分档：默认精简档（纯 HTTP，无 DB/认证）；按需逐级开启。
# 详见 docs/tiers.md。
[features]
default = []
database = ["dep:dms-infrastructure", "dms-infrastructure/database"]
multi-tenancy = ["database", "dms-infrastructure/multi-tenancy"]
auth = [
    "multi-tenancy",
    "dms-infrastructure/auth",
    "dms-application/auth",
    "dms-api/auth",
    "dep:sqlx",
]
audit = ["multi-tenancy", "dms-infrastructure/audit"]
project = [
    "auth",
    "audit",
    "dms-infrastructure/project",
    "dms-application/project",
    "dms-api/project",
]
full = ["database", "multi-tenancy", "auth", "audit", "project"]
