# 云端多租户 SaaS 覆盖：多副本、自动扩缩、迁移由发布流程单独执行、Ingress 暴露。
replicaCount: 3
appEnv: cloud
runMigrationsOnStart: false

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70

secret:
  # 生产：引用已存在的 Secret（由密钥管理/外部 secret operator 注入）。
  existingSecret: dms-backend-secrets

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: api.dms.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: dms-backend-tls
      hosts:
        - api.dms.example.com
