{{- if not .Values.secret.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dms-backend.secretName" . }}
  labels:
    {{- include "dms-backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  DMS__DATABASE__URL: {{ required "secret.databaseUrl 或 secret.existingSecret 必填" .Values.secret.databaseUrl | quote }}
  {{- if .Values.secret.migrationUrl }}
  DMS__DATABASE__MIGRATION_URL: {{ .Values.secret.migrationUrl | quote }}
  {{- end }}
  DMS__AUTH__JWT_SECRET: {{ required "secret.jwtSecret 或 secret.existingSecret 必填" .Values.secret.jwtSecret | quote }}
{{- end }}
